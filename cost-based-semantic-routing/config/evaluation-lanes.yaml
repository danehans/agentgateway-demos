apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai-baseline-expensive
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: cost-based-semantic-routing-demo
spec:
  ai:
    provider:
      openai:
        model: gpt-5.5
  policies:
    auth:
      secretRef:
        name: openai-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: openai-baseline-expensive
  namespace: agentgateway-system
  labels:
    app.kubernetes.io/name: cost-based-semantic-routing-demo
spec:
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
    namespace: agentgateway-system
  rules:
  - matches:
    - headers:
      - name: x-eval-lane
        value: always_expensive
      path:
        type: PathPrefix
        value: /v1/chat/completions
    backendRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: openai-baseline-expensive
      namespace: agentgateway-system
