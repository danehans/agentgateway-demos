apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: semantic-routing-telemetry
  namespace: agentgateway-system
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway-proxy
  frontend:
    metrics:
      attributes:
        add:
        - name: eval_lane
          expression: 'request.headers["x-eval-lane"]'
        - name: evaluation_id
          expression: 'request.headers["x-evaluation-id"]'
